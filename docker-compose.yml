services:
  supernand:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/anandaadityap/supernand:latest
    container_name: supernand
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SITE_URL=https://supernand.tech
    networks:
      - nginx-network

networks:
  nginx-network:
    external: true