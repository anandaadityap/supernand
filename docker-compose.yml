version: '3.8'

services:
  caddy:
    image: caddy:2
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data:/data
      - ./config:/config
    environment:
      - EMAIL=admin@supernand.tech
    networks:
      - supernand-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: supernand-app
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NEXT_PUBLIC_SITE_URL: https://supernand.tech
      PORT: 3000
    networks:
      - supernand-network

networks:
  supernand-network:
    driver: bridge
