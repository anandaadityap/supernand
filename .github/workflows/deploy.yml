name: Build & Deploy

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: anandaadityap/supernand

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Extract metadata (tags, refs)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=commit,prefix=
            type=sha,prefix=
            type=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    
    steps:
      - name: Deploy via SSH to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            set -e
            
            IMAGE_TAG=${{ github.sha }}
            
            echo "=== Logging in to GHCR ==="
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u anandaadityap --password-stdin
            
            echo "=== Stopping and removing old container ==="
            docker stop supernand-app 2>/dev/null || true
            docker rm supernand-app 2>/dev/null || true
            
            echo "=== Pulling new image ==="
            docker pull ghcr.io/anandaadityap/supernand:${IMAGE_TAG}
            docker tag ghcr.io/anandaadityap/supernand:${IMAGE_TAG} ghcr.io/anandaadityap/supernand:latest
            
            echo "=== Starting new container ==="
            docker run -d \
              --name supernand-app \
              --restart unless-stopped \
              -p 3000:3000 \
              -e NEXT_PUBLIC_SITE_URL=https://supernand.tech \
              -e PORT=3000 \
              ghcr.io/anandaadityap/supernand:latest
            
            docker logout ghcr.io
            
            echo "=== Deployment complete ==="
            docker ps | grep supernand-app
