name: Build & Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKERHUB_USERNAME }}/supernand
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/supernand:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/supernand:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Report image info
        run: |
          echo "Built and pushed image: ${{ secrets.DOCKERHUB_USERNAME }}/supernand:latest"
          echo "SHA tag: ${{ secrets.DOCKERHUB_USERNAME }}/supernand:${{ github.sha }}"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_TAG: ${{ github.sha }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            set -e
            echo "=== Deploying with image tag: $IMAGE_TAG ==="
            
            cd /root/.openclaw/workspace/supernand-portfolio
            
            # Pull latest code (includes docker-compose.yml)
            git fetch origin main
            git reset --hard origin/main
            git clean -fdx
            
            # Stop existing containers
            docker compose down 2>/dev/null || true
            docker rm -f supernand-app 2>/dev/null || true
            
            # Pull the new image from Docker Hub
            echo "Pulling image ${{ secrets.DOCKERHUB_USERNAME }}/supernand:$IMAGE_TAG"
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/supernand:$IMAGE_TAG
            
            # Tag as local
            docker tag ${{ secrets.DOCKERHUB_USERNAME }}/supernand:$IMAGE_TAG supernand-app:latest
            
            # Start services
            docker compose up -d
            
            # Show status
            docker compose ps
            echo "=== Deployment complete ==="