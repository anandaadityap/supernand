name: Build & Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Write SSH key
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          
          # Write key using printf to preserve newlines
          printf '%s' "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Verify key is valid
          ssh-keygen -l -f ~/.ssh/id_rsa 2>&1 || echo "Key check failed"
          
          # Add host to known_hosts
          ssh-keyscan -H -p 22 ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy
        run: |
          ssh -v -o StrictHostKeyChecking=no -o ConnectTimeout=10 -o PasswordAuthentication=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            cd /var/www/supernand
            git pull origin main
            docker compose build app
            docker compose up -d app
            docker image prune -f
          "