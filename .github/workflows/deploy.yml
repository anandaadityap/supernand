name: Build & Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH with password
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          use_insecure_cipher: true
          script: |
            cd /var/www/supernand
            
            # Stop and remove all containers
            docker compose down --remove-orphans 2>/dev/null || true
            
            # Force remove any existing supernand-app container by name or ID
            docker rm -f supernand-app 2>/dev/null || true
            docker rm -f 9a02425c486e8fa848d538ba39c81eb74eb0e2de8779bf17ea8bff3c912985ae 2>/dev/null || true
            
            # Remove all Docker builder cache completely
            docker builder prune -af 2>/dev/null || true
            
            # Force fresh checkout
            git fetch origin main
            git reset --hard origin/main
            git clean -fdx
            
            # Remove .next cache 
            rm -rf .next node_modules/.cache
            
            # Rebuild from scratch with no cache
            docker compose build --no-cache app
            
            # Start the app fresh
            docker compose up -d
