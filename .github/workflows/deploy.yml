name: Build & Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH with password
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          use_insecure_cipher: true
          script: |
            cd /var/www/supernand
            
            # Stop everything and remove all containers, images, and volumes
            docker compose down --remove-orphans --volumes 2>/dev/null || true
            
            # Remove all Docker builder cache completely
            docker builder prune -af 2>/dev/null || true
            
            # Also remove ALL local git changes and force fresh checkout
            git fetch origin main
            git reset --hard origin/main
            git clean -fdx
            
            # Remove .next cache to force fresh build (this is critical!)
            rm -rf .next node_modules/.cache
            
            # Pull fresh base images
            docker compose pull postgres || true
            
            # Rebuild from scratch with no cache
            docker compose build --no-cache app
            
            # Start the app
            docker compose up -d
