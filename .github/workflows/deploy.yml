name: Build & Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: |
            .next/
            public/
            node_modules/.prisma/
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build

      - name: Deploy via SSH with password
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          use_insecure_cipher: true
          script: |
            cd /var/www/supernand
            git fetch origin main
            git reset --hard origin/main
            # Restore build artifacts
            cp -r ${{ github.workspace }}/.next ./
            cp -r ${{ github.workspace }}/public ./
            cp -r ${{ github.workspace }}/node_modules/.prisma ./node_modules/
            # Stop old container, rebuild without cache (to refresh base image), and start
            docker compose down --remove-orphans || true
            docker builder prune -af || true
            docker compose build --no-cache app
            docker compose up -d app
            docker image prune -af
