name: Build & Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH with password
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          use_insecure_cipher: true
          script: |
            cd /var/www/supernand
            
            # Stop and remove all containers and associated images/volumes
            docker compose down --remove-orphans --volumes 2>/dev/null || true
            
            # Remove all Docker builder cache to ensure fresh build
            docker builder prune -af --filter "until=168h" 2>/dev/null || true
            
            # Pull fresh code from GitHub
            git fetch origin main
            git reset --hard origin/main
            
            # Rebuild from scratch without any cache
            docker compose build --no-cache app
            
            # Start the app
            docker compose up -d app
            
            # Clean up unused images
            docker image prune -af 2>/dev/null || true
